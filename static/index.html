<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EagleLearn • Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { overflow-y: scroll; overflow-x: hidden; }
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #8B4513, #A0522D);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            width: 100%;
        }
        .auth-container {
            background: white;
            border-radius: 32px;
            padding: 40px 24px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo-section { text-align: center; margin-bottom: 32px; }
        .eagle-mascot { font-size: 64px; animation: soar 2s infinite; }
        @keyframes soar { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .logo-section h1 { font-size: 32px; font-weight: 700; color: #8B4513; margin: 8px 0 4px; }
        .tagline { color: #777; font-size: 14px; }
        .tab-container { display: flex; gap: 8px; margin-bottom: 24px; background: #f0f0f0; padding: 4px; border-radius: 16px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; font-weight: 600; font-size: 16px; color: #777; cursor: pointer; border-radius: 12px; }
        .tab-btn.active { background: white; color: #8B4513; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .auth-form { display: none; }
        .auth-form.active-form { display: block; }
        .input-group { margin-bottom: 16px; }
        .input-group input { width: 100%; padding: 16px; font-size: 16px; border: 2px solid #e5e5e5; border-radius: 16px; outline: none; }
        .input-group input:focus { border-color: #8B4513; }
        .primary-btn { width: 100%; padding: 16px; background: #8B4513; color: white; border: none; border-radius: 16px; font-size: 18px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 0 #6B3410; }
        .primary-btn:active { transform: translateY(4px); box-shadow: none; }
        .error-message { color: #ff4b4b; font-size: 14px; text-align: center; margin-top: 12px; min-height: 20px; }
        .footer-note { text-align: center; margin-top: 24px; color: #aaa; font-size: 13px; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo-section">
            <div class="eagle-mascot">🦅</div>
            <h1>EagleLearn</h1>
            <p class="tagline">Soar to new heights! 🦅</p>
        </div>
        
        <div class="tab-container">
            <button class="tab-btn active" onclick="switchTab('login')">LOG IN</button>
            <button class="tab-btn" onclick="switchTab('register')">SIGN UP</button>
        </div>
        
        <form id="loginForm" class="auth-form active-form">
            <div class="input-group"><input type="text" id="loginUsername" placeholder="Username" required></div>
            <div class="input-group"><input type="password" id="loginPassword" placeholder="Password" required></div>
            <button type="submit" class="primary-btn">Take Flight →</button>
            <p id="loginError" class="error-message"></p>
        </form>
        
        <form id="registerForm" class="auth-form">
            <div class="input-group"><input type="text" id="regUsername" placeholder="Choose username" required></div>
            <div class="input-group"><input type="password" id="regPassword" placeholder="Create password" required></div>
            <div class="input-group"><input type="text" id="teacherCode" placeholder="Teacher Code (optional)"></div>
            <button type="submit" class="primary-btn">Join the Sky →</button>
            <p id="regError" class="error-message"></p>
        </form>
        
        <p class="footer-note">🦅 Free forever • Spread your wings</p>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active-form'));
            if (tab === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active-form');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active-form');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const res = await fetch('/api/login', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username, password})});
                const data = await res.json();
                data.success ? window.location.href = '/home' : document.getElementById('loginError').textContent = data.message;
            } catch { document.getElementById('loginError').textContent = 'Connection error!'; }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const teacherCode = document.getElementById('teacherCode').value;
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password, teacher_code: teacherCode})
                });
                const data = await res.json();
                if (data.success) { 
                    alert('Account created!'); 
                    switchTab('login'); 
                    document.getElementById('loginUsername').value = username; 
                } else { 
                    document.getElementById('regError').textContent = data.message; 
                }
            } catch { 
                document.getElementById('regError').textContent = 'Connection error!'; 
            }
        });
    </script>
</body>
</html>
